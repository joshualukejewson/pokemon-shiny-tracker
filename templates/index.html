<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="{{ url_for('static', filename='styles/styles.css') }}">
</head>
<body>
	<div class="container">
		<h1>Pokemon Shiny Tracker</h1>
		<p>Shiny tracking, odds calculator and collection hub.</p>


			<form method="POST">
				<label for="pokemon-name">Pokemon Name:</label><br>
				<input type="text" name="pokemon-name"><br>
				<button type="submit">Hunt</button>
				<button type="button" id="encounter-button">Increment</button>
				<button type="button" id="reset-button">Reset</button>
				<p id="encounters-count">0</p>
			</form>
		<div class="pokemon-card">
			{% if pokemon %}
				<img src={{pokemon.shiny_sprite}} alt="A beautiful sunset over the ocean" width="80" height="80">
				<img src={{pokemon.normal_sprite}} alt="A beautiful sunset over the ocean" width="80" height="80">
			{% endif %}
		</div>
	</div>
		<script src="static/script.js"></script>
</body>
</html>
